// ── Anomaly detection for summary cards ──
// Returns {calStatus, weightStatus, sugarStatus} each: "normal"|"warning"|"danger"|"none"
function getDayStatus(data,date){
  const day=data.days[date];
  if(!day)return{calStatus:"none",weightStatus:"none",sugarStatus:"none"};
  // Calorie: count how many main meals recorded
  let totalCal=0,mealCount=0;
  MAIN_MEALS.forEach(mk=>{if(day.meals?.[mk]?.length){mealCount++;day.meals[mk].forEach(i=>{totalCal+=(i.cal||0)*(i.amount||1);});}});
  // also count snacks
  Object.keys(day.meals||{}).forEach(mk=>{if(!MAIN_MEALS.includes(mk)&&day.meals[mk]?.length){day.meals[mk].forEach(i=>{totalCal+=(i.cal||0)*(i.amount||1);});}});
  // 66yo chemo patient: need ~1500-1800/day. Per meal ~450-600
  let calStatus="none";
  if(totalCal>0){
    calStatus=totalCal<1200?"danger":totalCal<1500?"warning":"normal";
  }
  // Weight: chemo patient, compare to 7-day trend
  let weightStatus="none";
  if(day.weight){
    const dates=[];const d=new Date(date+"T12:00:00");
    for(let i=7;i>=1;i--){const dd=new Date(d);dd.setDate(d.getDate()-i);dates.push(dd.toISOString().slice(0,10));}
    const prevWeights=dates.map(dt=>data.days[dt]?.weight).filter(Boolean);
    if(prevWeights.length>0){
      const avg=prevWeights.reduce((a,b)=>a+b,0)/prevWeights.length;
      const drop=avg-day.weight;
      weightStatus=drop>2?"danger":drop>1?"warning":"normal";
    }else weightStatus="normal";
  }
  // Blood sugar: diabetic patient
  let sugarStatus="none";
  if(day.bloodSugar?.length){
    let hasAnomaly=false,hasDanger=false;
    day.bloodSugar.forEach(s=>{
      if(s.value<4){hasDanger=true;}
      else if(s.timing==="空腹"&&s.value>7){hasAnomaly=true;}
      else if(s.timing==="空腹"&&s.value>10){hasDanger=true;}
      else if(s.timing.includes("餐后")&&s.value>11.1){hasAnomaly=true;}
      else if(s.timing.includes("餐后")&&s.value>16.7){hasDanger=true;}
    });
    sugarStatus=hasDanger?"danger":hasAnomaly?"warning":"normal";
  }
  return{calStatus,weightStatus,sugarStatus,totalCal,mealCount};
}

// ── Voice parsing (multi-meal support) ──
function parseVoiceInput(text){
  const result={mealGroups:[],bloodSugar:[],weight:null};
  const t=text.replace(/[，。！？、；：""''（）【】]+/g," ").replace(/\s+/g," ").trim();

  function extractNum(str){
    const dec=str.match(/([\d]+\.[\d]+)/);if(dec)return parseFloat(dec[1]);
    const num=str.match(/([\d]+)/);if(num)return parseFloat(num[1]);
    for(const[cn,n]of Object.entries(NUM_MAP)){if(str.includes(cn))return n;}
    return null;
  }

  // Weight (from full text)
  const wPats=[/体重[是有为]?\s*(\d+\.?\d*)\s*(公斤|千克|斤|kg)?/i,/(\d+\.?\d*)\s*(公斤|千克|斤|kg)/i];
  for(const p of wPats){const m=t.match(p);if(m){let v=parseFloat(m[1]);if(m[2]==="斤")v/=2;if(v>=20&&v<=200){result.weight=v;break;}}}

  // Blood sugar (from full text, with consumed ranges)
  const sugarRules=[
    {p:/空腹[血]?糖[是为]?\s*([\d.]+)/,t:"空腹"},
    {p:/空腹[是为]?\s*([\d.]+)/,t:"空腹"},
    {p:/餐前[血]?糖[是为]?\s*([\d.]+)/,t:"空腹"},
    {p:/餐后[一1].*?小时.*?([\d.]+)/,t:"餐后1h"},
    {p:/餐后[两二2].*?小时.*?([\d.]+)/,t:"餐后2h"},
    {p:/[饭餐]后[一1].*?时.*?([\d.]+)/,t:"餐后1h"},
    {p:/[饭餐]后[两二2].*?时.*?([\d.]+)/,t:"餐后2h"},
    {p:/餐后[血]?糖[是为]?\s*([\d.]+)/,t:"餐后2h"},
    {p:/饭后[血]?糖[是为]?\s*([\d.]+)/,t:"餐后2h"},
    {p:/睡前[血]?糖[是为]?\s*([\d.]+)/,t:"睡前"},
    {p:/随机[血]?糖[是为]?\s*([\d.]+)/,t:"随机"},
  ];
  const consumed=[];
  function isConsumed(s,e){return consumed.some(r=>!(e<=r[0]||s>=r[1]));}
  for(const{p,t:timing}of sugarRules){
    const m=t.match(p);if(!m)continue;
    const s=m.index,e=s+m[0].length;
    if(isConsumed(s,e))continue;
    const v=parseFloat(m[1]);
    if(v>=2&&v<=35&&!result.bloodSugar.find(x=>x.timing===timing)){
      result.bloodSugar.push({value:v,timing});consumed.push([s,e]);
    }
  }

  // ── Multi-meal segmentation ──
  // Use specific longer patterns first, then shorter ones
  // Key: match "加餐" variants BEFORE plain meal names
  const mealMarkerPatterns=[
    {p:/早[餐饭]?\s*加餐/g,k:"breakfast_snack"},
    {p:/午[餐饭]?\s*加餐|下午\s*加餐/g,k:"lunch_snack"},
    {p:/晚[餐饭]?\s*加餐|夜宵|宵夜/g,k:"dinner_snack"},
    {p:/(?<![早午晚])加餐|零食|点心/g,k:"snack"},
    {p:/早[餐饭上晨]|早[餐饭]?[是吃了]/g,k:"breakfast"},
    {p:/午[餐饭]|中午[吃了]?/g,k:"lunch"},
    {p:/晚[餐饭上]|晚[餐饭]?[是吃了]/g,k:"dinner"},
  ];

  // Collect all markers
  let allMarkers=[];
  for(const{p,k}of mealMarkerPatterns){
    p.lastIndex=0;
    let m;while((m=p.exec(t))!==null){
      allMarkers.push({pos:m.index,end:m.index+m[0].length,key:k,len:m[0].length});
    }
  }
  // Sort by position, then prefer longer matches
  allMarkers.sort((a,b)=>a.pos-b.pos||b.len-a.len);
  // Remove overlapping: keep the first (longest due to sort) at each position
  const markers=[];
  for(const m of allMarkers){
    if(!markers.some(x=>!(m.end<=x.pos||m.pos>=x.end)))markers.push(m);
  }

  const defaultMeal=(()=>{const h=new Date().getHours();if(h<10)return"breakfast";if(h<14)return"lunch";if(h<20)return"dinner";return"snack";})();

  // Build segments: each marker owns text from its position to the next marker
  let segments=[];
  if(markers.length===0){
    segments=[{key:defaultMeal,text:t}];
  }else{
    // If there's text before the first marker, assign it to that first marker's meal
    // (e.g. "吃了一碗粥早餐加餐吃了蛋白粉" -> "吃了一碗粥" belongs to... hmm)
    // Actually if first marker is at pos>0, text before it is ambiguous.
    // Better: assign pre-marker text to the first marker's key
    for(let i=0;i<markers.length;i++){
      const textStart=i===0?0:markers[i].end;
      const textEnd=i<markers.length-1?markers[i+1].pos:t.length;
      // For first marker, include text from 0 to next marker (or end)
      const segText=i===0?t.slice(0,i<markers.length-1?markers[i+1].pos:t.length):t.slice(markers[i].end,textEnd);
      if(segText.trim())segments.push({key:markers[i].key,text:segText});
    }
  }

  // ── Parse food from each segment ──
  const sortedFoods=[...FOOD_DB].sort((a,b)=>{
    const maxA=Math.max(a.name.length,...a.aliases.map(x=>x.length));
    const maxB=Math.max(b.name.length,...b.aliases.map(x=>x.length));
    return maxB-maxA;
  });

  // Common food-like patterns for unknown foods: "N个/碗/份/块/根/杯/勺 XXX" or "XXX N个/碗..."
  const UNITS=["碗","个","份","块","根","杯","勺","只","把","片","串","瓶","盒","袋"];
  const unitRegex=new RegExp(`([${UNITS.join("")}])`);

  for(const seg of segments){
    const foods=[];const segConsumed=[];// ranges consumed by matched foods
    // First pass: match known foods
    for(const food of sortedFoods){
      const names=[food.name,...food.aliases];
      for(const name of names){
        if(name.length<2)continue;
        const idx=seg.text.indexOf(name);if(idx===-1)continue;
        if(segConsumed.some(r=>idx>=r[0]&&idx<r[1]))continue;
        const before=seg.text.slice(Math.max(0,idx-8),idx);
        const after=seg.text.slice(idx+name.length,idx+name.length+8);
        let amount=extractNum(before+after)||1;
        if((before+after).includes("半")){const intN=extractNum((before+after).replace("半",""));amount=intN?intN+0.5:0.5;}
        if(food.unit==="碗"&&amount>5)amount=1;
        if(food.unit==="个"&&amount>20&&food.cal>30)amount=1;
        if(food.unit==="块"&&amount>15)amount=1;
        if(food.unit==="份"&&amount>5)amount=1;
        if(!foods.find(f=>f.name===food.name)){
          foods.push({name:food.name,unit:food.unit,cal:food.cal,gi:food.gi,amount});
          segConsumed.push([idx,idx+name.length]);
        }
        break;
      }
    }

    // Second pass: extract unknown foods (e.g. "两个芋头")
    // Only pattern: number + unit + food_name (safer, avoids "早餐吃了" false match)
    const unknownPat=/([一二两三四五六七八九十\d]+\.?\d*)\s*([碗个份块根杯勺只把片串瓶盒袋])\s*([\u4e00-\u9fff]{2,4})/g;
    unknownPat.lastIndex=0;let um;
    while((um=unknownPat.exec(seg.text))!==null){
      const mStart=um.index,mEnd=mStart+um[0].length;
      if(segConsumed.some(r=>!(mEnd<=r[0]||mStart>=r[1])))continue;
      const amount=extractNum(um[1])||1;const unit=um[2];const foodName=um[3];
      // Skip meal/medical keywords
      if(/[早午晚餐饭加]|血糖|体重|公斤|空腹|餐后|餐前|小时|然后|因为|所以|已经|今天|昨天/.test(foodName))continue;
      if(!foods.find(f=>f.name===foodName)){
        foods.push({name:foodName,unit:unit,cal:100,gi:50,amount,isCustom:true});
        segConsumed.push([mStart,mEnd]);
      }
    }
    // Also try: food_name + number + unit (e.g. "芋头两个") but stricter
    const unknownPat2=/([\u4e00-\u9fff]{2,4})\s*([一二两三四五六七八九十\d]+\.?\d*)\s*([碗个份块根杯勺只把片串瓶盒袋])/g;
    unknownPat2.lastIndex=0;
    while((um=unknownPat2.exec(seg.text))!==null){
      const mStart=um.index,mEnd=mStart+um[0].length;
      if(segConsumed.some(r=>!(mEnd<=r[0]||mStart>=r[1])))continue;
      const foodName=um[1];const amount=extractNum(um[2])||1;const unit=um[3];
      if(/[早午晚餐饭加吃了的是]|血糖|体重|公斤|空腹|餐后|餐前|小时|然后|因为|所以|已经|今天|昨天/.test(foodName))continue;
      if(!foods.find(f=>f.name===foodName)){
        foods.push({name:foodName,unit:unit,cal:100,gi:50,amount,isCustom:true});
        segConsumed.push([mStart,mEnd]);
      }
    }

    if(foods.length>0){
      const existing=result.mealGroups.find(g=>g.meal===seg.key);
      if(existing)existing.foods.push(...foods);
      else result.mealGroups.push({meal:seg.key,foods});
    }
  }

  return result;
}

// ── AI Analysis (context-aware) ──
function analyzeHealth(data,mode,trendDays){
  const alerts=[],suggestions=[];
  const dateList=[];const d=new Date();
  const days=mode==="today"?1:trendDays;
  for(let i=days-1;i>=0;i--){const dd=new Date(d);dd.setDate(d.getDate()-i);dateList.push(dd.toISOString().slice(0,10));}
  const weights=[],sugarsByType={},dailyCals=[];
  dateList.forEach(date=>{
    const day=data.days[date];if(!day)return;
    if(day.weight)weights.push({date,value:day.weight});
    if(day.bloodSugar)day.bloodSugar.forEach(s=>{
      if(!sugarsByType[s.timing])sugarsByType[s.timing]=[];
      sugarsByType[s.timing].push({date,value:s.value,timing:s.timing});
    });
    let tc=0,mc=0;
    MAIN_MEALS.forEach(mk=>{if(day.meals?.[mk]?.length){mc++;day.meals[mk].forEach(i=>{tc+=(i.cal||0)*(i.amount||1);});}});
    Object.keys(day.meals||{}).forEach(mk=>{if(!MAIN_MEALS.includes(mk)&&day.meals[mk]?.length){day.meals[mk].forEach(i=>{tc+=(i.cal||0)*(i.amount||1);});}});
    if(tc>0)dailyCals.push({date,value:tc,mealCount:mc});
  });

  // Weight analysis (chemo context)
  if(weights.length>=2){
    const ch=weights[weights.length-1].value-weights[0].value;
    const pct=Math.abs((ch/weights[0].value*100).toFixed(1));
    if(ch<-2)alerts.push({type:"danger",icon:"🚨",title:"体重下降过快",text:`化疗期间体重下降${Math.abs(ch).toFixed(1)}kg（${pct}%），这可能影响后续化疗效果和身体耐受性。建议：①立即告知主治医生；②增加高热量高蛋白饮食（蛋白粉、营养液）；③考虑肠内营养支持。`});
    else if(ch<-1)alerts.push({type:"warning",icon:"⚠️",title:"体重有下降趋势",text:`${days===1?"今天":"近"+days+"天"}体重下降${Math.abs(ch).toFixed(1)}kg。化疗期间维持体重非常重要，体重下降会削弱免疫力，影响化疗耐受。建议增加少食多餐频次，每天至少1-2次加餐。`});
    else suggestions.push({icon:"👍",text:`体重${ch>=0?"保持稳定":"仅微降"+Math.abs(ch).toFixed(1)+"kg"}，化疗期间能维持体重非常好，继续保持！`});
  }else if(weights.length===1){suggestions.push({icon:"📝",text:"只有1天体重数据，坚持每天早上空腹称重，方便观察趋势。"});}
  else suggestions.push({icon:"📝",text:"还没有体重记录，建议每天早上空腹称重。"});

  // Blood sugar analysis (diabetic context)
  // Blood sugar combined analysis (diabetic + chemo context)
  const allSugars=Object.values(sugarsByType).flat();
  if(allSugars.length>0){
    const fasting=sugarsByType["空腹"]||[];
    const post1h=sugarsByType["餐后1h"]||[];
    const post2h=sugarsByType["餐后2h"]||[];
    const periodLabel=mode==="today"?"今天":days<=7?"近7天":"近30天";

    // Check for danger first
    if(allSugars.some(s=>s.value<4)){
      alerts.push({type:"danger",icon:"🚨",title:"血糖分析：出现低血糖",text:"出现血糖<4.0mmol/L！化疗期间低血糖尤其危险，可能引起昏迷。请立即补充糖分（糖水、果汁），并及时告知医生调整降糖方案。"});
    }else if(allSugars.some(s=>s.value>16.7)){
      alerts.push({type:"danger",icon:"🚨",title:"血糖分析：严重偏高",text:"出现血糖>16.7mmol/L，有酮症酸中毒风险。化疗药物可能加重血糖波动，请立即联系医生。"});
    }else{
      // Build combined analysis text
      let lines=[];let hasWarning=false;

      if(fasting.length>0){
        const avg=fasting.reduce((a,b)=>a+b.value,0)/fasting.length;
        const mn=Math.min(...fasting.map(s=>s.value)),mx=Math.max(...fasting.map(s=>s.value));
        const rangeText=fasting.length>1?`（波动范围${mn.toFixed(1)}~${mx.toFixed(1)}）`:"";
        if(avg>10){lines.push(`🔴 空腹血糖均值${avg.toFixed(1)}${rangeText}，明显偏高（建议<7.0），需与内分泌科协商调整降糖方案。`);hasWarning=true;}
        else if(avg>7){lines.push(`🟡 空腹血糖均值${avg.toFixed(1)}${rangeText}，偏高（建议<7.0），化疗期间波动属正常但需关注。`);hasWarning=true;}
        else{lines.push(`🟢 空腹血糖均值${avg.toFixed(1)}${rangeText}，控制不错（建议<7.0）。`);}
      }

      if(post1h.length>0){
        const avg=post1h.reduce((a,b)=>a+b.value,0)/post1h.length;
        const mn=Math.min(...post1h.map(s=>s.value)),mx=Math.max(...post1h.map(s=>s.value));
        const rangeText=post1h.length>1?`（波动${mn.toFixed(1)}~${mx.toFixed(1)}）`:"";
        if(avg>11.1){lines.push(`🟡 餐后1h均值${avg.toFixed(1)}${rangeText}，偏高（建议<11.1），可先吃蛋白质和蔬菜再吃主食。`);hasWarning=true;}
        else{lines.push(`🟢 餐后1h均值${avg.toFixed(1)}${rangeText}，达标（建议<11.1）。`);}
      }

      if(post2h.length>0){
        const avg=post2h.reduce((a,b)=>a+b.value,0)/post2h.length;
        const mn=Math.min(...post2h.map(s=>s.value)),mx=Math.max(...post2h.map(s=>s.value));
        const rangeText=post2h.length>1?`（波动${mn.toFixed(1)}~${mx.toFixed(1)}）`:"";
        if(avg>10){lines.push(`🟡 餐后2h均值${avg.toFixed(1)}${rangeText}，偏高（糖尿病建议<10.0），建议用杂粮替代精白米面。`);hasWarning=true;}
        else{lines.push(`🟢 餐后2h均值${avg.toFixed(1)}${rangeText}，达标（建议<10.0）。`);}
      }

      // Overall summary
      if(lines.length>0){
        let summary=hasWarning?
          `${periodLabel}共${allSugars.length}次血糖记录，部分指标偏高，建议与内分泌科医生沟通用药调整：\n\n`:
          `${periodLabel}共${allSugars.length}次血糖记录，整体控制良好：\n\n`;
        if(days>7&&fasting.length>1){
          // Add trend for 30-day
          const firstHalf=fasting.slice(0,Math.floor(fasting.length/2));
          const secondHalf=fasting.slice(Math.floor(fasting.length/2));
          const avg1=firstHalf.reduce((a,b)=>a+b.value,0)/firstHalf.length;
          const avg2=secondHalf.reduce((a,b)=>a+b.value,0)/secondHalf.length;
          const trend=avg2-avg1;
          if(Math.abs(trend)>0.5){
            summary+=`📈 空腹血糖${trend>0?"呈上升趋势":"呈下降趋势"}（前半段均值${avg1.toFixed(1)}→后半段${avg2.toFixed(1)}），${trend>0?"需注意是否需要调药。":"控制方向良好。"}\n\n`;
          }
        }
        const card={type:hasWarning?"warning":"info",icon:"🩸",title:`血糖分析（${periodLabel}）`,text:summary+lines.join("\n")};
        if(hasWarning)alerts.push(card);else suggestions.push(card);
      }
    }
  }

  // Calorie analysis - always full-day perspective
  if(dailyCals.length>0){
    if(mode==="today"){
      const latest=dailyCals[dailyCals.length-1];
      if(latest){
        const tc=latest.value;const mc=latest.mealCount;
        const mealNote=mc>=3?"三餐":mc===2?"两餐":"一餐";
        if(tc<1200)alerts.push({type:"warning",icon:"🍽️",title:"今日摄入偏低",text:`目前已记录${mealNote}共${Math.round(tc)}大卡。66岁化疗患者每日建议1500-1800大卡，当前偏低。建议增加高蛋白食物（鸡蛋、鱼、营养液）和少食多餐。${mc<3?`（目前只记录了${mealNote}，记得把其他餐次也记上）`:""}`});
        else if(tc<1500)suggestions.push({icon:"💪",text:`已记录${mealNote}共${Math.round(tc)}大卡，还不错！${mc<3?"记得把其他餐次也记上，":""}如能达到1500以上就更理想了。`});
        else suggestions.push({icon:"🎉",text:`已记录${mealNote}共${Math.round(tc)}大卡，摄入量很好！化疗期间能吃就是好事！`});
      }
    }else{
      const avg=dailyCals.reduce((a,b)=>a+b.value,0)/dailyCals.length;
      if(avg<1200)alerts.push({type:"warning",icon:"🍽️",title:"日均摄入偏低",text:`近${days}天日均约${Math.round(avg)}大卡，66岁化疗患者建议每日1500-1800大卡。营养不足会影响化疗效果和身体恢复，建议少食多餐并增加营养液。`});
      else if(avg<1500)suggestions.push({icon:"💪",text:`近${days}天日均${Math.round(avg)}大卡，如能增加到1500以上会更好。`});
      else suggestions.push({icon:"🎉",text:`近${days}天日均${Math.round(avg)}大卡，摄入量不错！`});
    }
  }

  if(!alerts.length&&!suggestions.length)suggestions.push({icon:"📋",text:"数据还少，坚持记录我会给出更精准建议。"});
  suggestions.push({icon:"💡",text:"化疗期小贴士：少食多餐好过三顿大餐；想吃的时候就吃；蛋白质（蛋、鱼、豆腐）有助恢复；吃不下时喝营养液补充。"});
  return{alerts,suggestions,weights,sugarsByType,dailyCals};
}

// ── Chart ──
function SimpleChart({dataPoints,label,color,dangerHigh,dangerLow}){
  if(!dataPoints||!dataPoints.length)return React.createElement("div",{style:{padding:"28px 16px",textAlign:"center",color:"#94a3b8",fontSize:16,background:"#f8fafc",borderRadius:12}},`暂无${label}数据`);
  const vals=dataPoints.map(p=>p.value);
  const mn=Math.min(...vals)*0.92,mx=Math.max(...vals)*1.08,range=mx-mn||1;
  const H=170,W=Math.max(dataPoints.length*64,300);
  return(
    <div style={{overflowX:"auto",padding:"8px 0"}}>
      <svg width={W} height={H+50} viewBox={`0 0 ${W} ${H+50}`}>
        {dangerHigh&&<rect x={0} y={0} width={W} height={Math.max(0,((mx-dangerHigh)/range)*H)} fill="rgba(239,68,68,0.06)"/>}
        {dangerLow&&<rect x={0} y={((mx-dangerLow)/range)*H} width={W} height={H-((mx-dangerLow)/range)*H} fill="rgba(239,68,68,0.06)"/>}
        {dangerHigh&&<line x1={0} y1={((mx-dangerHigh)/range)*H} x2={W} y2={((mx-dangerHigh)/range)*H} stroke="#ef4444" strokeWidth="1" strokeDasharray="6,4" opacity="0.4"/>}
        {dangerLow&&<line x1={0} y1={((mx-dangerLow)/range)*H} x2={W} y2={((mx-dangerLow)/range)*H} stroke="#ef4444" strokeWidth="1" strokeDasharray="6,4" opacity="0.4"/>}
        <polygon fill={`${color}15`} points={`32,${H+8} ${dataPoints.map((p,i)=>`${32+i*60},${((mx-p.value)/range)*H+8}`).join(" ")} ${32+(dataPoints.length-1)*60},${H+8}`}/>
        <polyline fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" points={dataPoints.map((p,i)=>`${32+i*60},${((mx-p.value)/range)*H+8}`).join(" ")}/>
        {dataPoints.map((p,i)=>{const x=32+i*60,y=((mx-p.value)/range)*H+8;const isA=(dangerHigh&&p.value>dangerHigh)||(dangerLow&&p.value<dangerLow);return(<g key={i}><circle cx={x} cy={y} r={isA?7:5} fill={isA?"#ef4444":color}/>{isA&&<circle cx={x} cy={y} r={11} fill="none" stroke="#ef4444" strokeWidth="2" opacity="0.4"/>}<text x={x} y={y-14} textAnchor="middle" fontSize="13" fontWeight="700" fill={isA?"#ef4444":"#334155"}>{p.value}</text><text x={x} y={H+28} textAnchor="middle" fontSize="11" fill="#94a3b8">{formatDate(p.date)}</text></g>);})}
      </svg>
    </div>
  );
}

  const dayStatus=useMemo(()=>getDayStatus(data,currentDate),[data,currentDate]);

  // Process voice/text input and show confirm
  function processAndConfirm(text){
    setVoiceText(text);
    setParseResult(parseVoiceInput(text));
    setShowConfirm(true);
  }

  const startListening=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){showToast("此浏览器不支持语音，请用打字输入");setShowManualInput(true);return;}
    try{
      const recognition=new SR();recognition.lang="zh-CN";
      recognition.continuous=false;recognition.interimResults=true;
      recognition.maxAlternatives=1;
      let finalText="";let interimText="";
      recognition.onresult=(event)=>{
        interimText="";
        for(let i=event.resultIndex;i<event.results.length;i++){
          if(event.results[i].isFinal)finalText+=event.results[i][0].transcript;
          else interimText=event.results[i][0].transcript;
        }
        setVoiceText(finalText+interimText);
      };
      recognition.onend=()=>{
        if(recognitionRef.current===recognition&&!finalText.trim()&&isListeningRef.current){
          try{recognition.start();}catch(e){}
          return;
        }
        setIsListening(false);isListeningRef.current=false;
        if(finalText.trim()){
          // Fill into the inline textarea so user can review, then auto-submit
          setManualInput(prev=>prev?(prev+" "+finalText):finalText);
          processAndConfirm(finalText);
        }
      };
      recognition.onerror=(e)=>{
        setIsListening(false);isListeningRef.current=false;
        if(e.error==="not-allowed"||e.error==="service-not-allowed"){
          showToast("❌ 语音不可用，请用输入法的语音按钮");
        }else if(e.error==="no-speech"){
          if(isListeningRef.current){try{recognition.start();}catch(ex){}}
        }else if(e.error==="network"){
          showToast("语音需要网络，请用输入法语音按钮代替");
        }
      };
      recognitionRef.current=recognition;isListeningRef.current=true;
      recognition.start();setIsListening(true);setVoiceText("");setParseResult(null);
    }catch(e){showToast("语音启动失败，请用输入法语音按钮");}
  };
  const stopListening=()=>{isListeningRef.current=false;if(recognitionRef.current){try{recognitionRef.current.stop();}catch(e){setIsListening(false);}}};
  const handleManualSubmit=()=>{if(!manualInput.trim())return;const txt=manualInput;setManualInput("");processAndConfirm(txt);};

  const confirmSave=()=>{
    if(!parseResult)return;const nd=JSON.parse(JSON.stringify(data));
    if(!nd.days[currentDate])nd.days[currentDate]={meals:{},weight:null,bloodSugar:[]};
    const day=nd.days[currentDate];const now=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
    if(parseResult.mealGroups?.length>0){
      parseResult.mealGroups.forEach(g=>{
        if(!day.meals[g.meal])day.meals[g.meal]=[];
        g.foods.forEach(f=>{day.meals[g.meal].push({name:f.name,unit:f.unit,amount:f.amount,cal:f.cal,gi:f.gi,time:now});});
      });
    }
    if(parseResult.weight)day.weight=parseResult.weight;
    if(parseResult.bloodSugar.length>0){if(!day.bloodSugar)day.bloodSugar=[];parseResult.bloodSugar.forEach(s=>{day.bloodSugar.push({value:s.value,timing:s.timing,time:now});});}
    persist(nd);setShowConfirm(false);setVoiceText("");setParseResult(null);
    const parts=[];
    const totalFoods=(parseResult.mealGroups||[]).reduce((a,g)=>a+g.foods.length,0);
    if(totalFoods)parts.push(`${totalFoods}项食物`);
    if(parseResult.weight)parts.push(`体重${parseResult.weight}kg`);if(parseResult.bloodSugar.length)parts.push(`${parseResult.bloodSugar.length}条血糖`);
    showToast(`✅ 已记录 ${parts.join("、")}`);
  };
  const updateParsedFoodAmount=(gi,fi,delta)=>{const nr=JSON.parse(JSON.stringify(parseResult));nr.mealGroups[gi].foods[fi].amount=Math.max(0.5,nr.mealGroups[gi].foods[fi].amount+delta);setParseResult(nr);};
  const removeParsedFood=(gi,fi)=>{const nr=JSON.parse(JSON.stringify(parseResult));nr.mealGroups[gi].foods.splice(fi,1);if(nr.mealGroups[gi].foods.length===0)nr.mealGroups.splice(gi,1);setParseResult(nr);};
  const removeParsedSugar=(idx)=>{const nr={...parseResult,bloodSugar:parseResult.bloodSugar.filter((_,i)=>i!==idx)};setParseResult(nr);};
  const hasAnyParsed=parseResult&&((parseResult.mealGroups||[]).some(g=>g.foods.length>0)||parseResult.bloodSugar?.length||parseResult.weight);

  const todayCal=useMemo(()=>dayStatus.totalCal||0,[dayStatus]);
  const analysis=useMemo(()=>analyzeHealth(data,analysisRange,analysisRange==="today"?1:parseInt(analysisRange)),[data,analysisRange]);
  const trendAnalysis=useMemo(()=>analyzeHealth(data,"range",trendRange),[data,trendRange]);
  const changeDate=(offset)=>{const d=new Date(currentDate+"T12:00:00");d.setDate(d.getDate()+offset);const nd=d.toISOString().slice(0,10);if(nd<=getToday())setCurrentDate(nd);};

  // Edit functions
  const removeFood=(mk,idx)=>{const nd=JSON.parse(JSON.stringify(data));nd.days[currentDate].meals[mk].splice(idx,1);persist(nd);};
  const removeSugar=(idx)=>{const nd=JSON.parse(JSON.stringify(data));nd.days[currentDate].bloodSugar.splice(idx,1);persist(nd);};
  const removeWeight=()=>{const nd=JSON.parse(JSON.stringify(data));if(nd.days[currentDate])nd.days[currentDate].weight=null;persist(nd);};
  const editWeight=()=>{const v=prompt("请输入新体重（kg）：",dayData.weight||"");if(v===null)return;const n=parseFloat(v);if(!isNaN(n)&&n>=20&&n<=200){const nd=JSON.parse(JSON.stringify(data));if(!nd.days[currentDate])nd.days[currentDate]={meals:{},weight:null,bloodSugar:[]};nd.days[currentDate].weight=n;persist(nd);showToast(`✅ 体重已更新为 ${n}kg`);}};
  const editSugar=(idx)=>{const bs=dayData.bloodSugar[idx];const v=prompt(`请输入新的${bs.timing}血糖值（mmol/L）：`,bs.value);if(v===null)return;const n=parseFloat(v);if(!isNaN(n)&&n>=2&&n<=35){const nd=JSON.parse(JSON.stringify(data));nd.days[currentDate].bloodSugar[idx].value=n;persist(nd);showToast(`✅ 血糖已更新`);}};
  const editFood=(mk,idx)=>{
    const item=dayData.meals[mk][idx];
    const newName=prompt("食物名称：",item.name);if(newName===null)return;
    const newAmt=prompt(`数量（${item.unit}）：`,item.amount);if(newAmt===null)return;
    const n=parseFloat(newAmt);if(isNaN(n)||n<=0)return;
    const nd=JSON.parse(JSON.stringify(data));
    // try to find in FOOD_DB for calorie update
    const dbFood=FOOD_DB.find(f=>f.name===newName||f.aliases.includes(newName));
    nd.days[currentDate].meals[mk][idx].name=newName.trim();
    nd.days[currentDate].meals[mk][idx].amount=n;
    if(dbFood){nd.days[currentDate].meals[mk][idx].cal=dbFood.cal;nd.days[currentDate].meals[mk][idx].unit=dbFood.unit;}
    persist(nd);
  };

  const statusColor=(s)=>s==="danger"?"#ef4444":s==="warning"?"#f59e0b":s==="normal"?"#10b981":"#cbd5e1";

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"linear-gradient(180deg,#fef9f0 0%,#fff5eb 30%,#fff 100%)",position:"relative",paddingBottom:100}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#1e293b",color:"white",padding:"14px 28px",borderRadius:16,fontSize:17,fontWeight:600,zIndex:1000,boxShadow:"0 8px 32px rgba(0,0,0,0.2)",animation:"fadeIn 0.3s ease",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Header */}
      <div style={{padding:"20px 20px 16px",background:"linear-gradient(135deg,#f97316,#fb923c)",borderRadius:"0 0 28px 28px",color:"white",boxShadow:"0 4px 20px rgba(249,115,22,0.3)"}}>
        <div style={{fontSize:13,opacity:0.85,marginBottom:4}}>爸爸的健康日记</div>
        <div style={{fontSize:26,fontWeight:800}}>{formatDate(currentDate)} {getWeekday(currentDate)}{currentDate===getToday()&&<span style={{fontSize:13,background:"rgba(255,255,255,0.25)",padding:"3px 10px",borderRadius:20,marginLeft:10,fontWeight:500}}>今天</span>}</div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
          <button onClick={()=>changeDate(-1)} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"8px 18px",borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer"}}>← 前一天</button>
          {currentDate!==getToday()&&<button onClick={()=>setCurrentDate(getToday())} style={{background:"rgba(255,255,255,0.25)",border:"none",color:"white",padding:"8px 18px",borderRadius:12,fontSize:15,fontWeight:600,cursor:"pointer"}}>回到今天</button>}
          <button onClick={()=>changeDate(1)} disabled={currentDate>=getToday()} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"8px 18px",borderRadius:12,fontSize:16,fontWeight:600,cursor:"pointer",opacity:currentDate>=getToday()?0.4:1}}>后一天 →</button>
        </div>
      </div>

      {/* Input area - text-first design, works in WeChat */}
      {activeTab==="record"&&(<div style={{padding:"20px 16px 0"}}>
        <div style={{background:"white",borderRadius:20,padding:20,boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:17,fontWeight:700,color:"#1e293b",marginBottom:8}}>📝 记录今天的情况</div>
          <div style={{fontSize:13,color:"#94a3b8",marginBottom:12,lineHeight:1.5}}>💡 点击输入框后，用键盘上的🎙️语音按钮说话，文字会自动填入</div>
          <textarea value={manualInput} onChange={e=>setManualInput(e.target.value)}
            placeholder={"点这里，然后用语音输入法说话\n\n示例：\n早餐吃了一碗粥、两个鸡蛋\n空腹血糖6.5，餐后2小时9.8\n体重65公斤"}
            style={{width:"100%",height:130,padding:16,borderRadius:14,border:"2px solid #e2e8f0",fontSize:17,outline:"none",resize:"none",lineHeight:1.6,fontFamily:"inherit",boxSizing:"border-box",background:"#fafafa"}}
            onFocus={e=>{e.target.style.borderColor="#f97316";e.target.style.background="white";}}
            onBlur={e=>{e.target.style.borderColor="#e2e8f0";e.target.style.background="#fafafa";}}
          />
          <div style={{display:"flex",gap:10,marginTop:12}}>
            {(window.SpeechRecognition||window.webkitSpeechRecognition)&&(
              <button onClick={isListening?stopListening:startListening} style={{
                padding:"12px 16px",borderRadius:14,border:"none",fontSize:15,fontWeight:600,cursor:"pointer",
                background:isListening?"#dc2626":"#f1f5f9",color:isListening?"white":"#64748b",
                display:"flex",alignItems:"center",gap:6,
                animation:isListening?"pulse 1.5s ease-in-out infinite":"none",
              }}>{isListening?"⏹️ 停止":"🎙️ 语音"}</button>
            )}
            <button onClick={handleManualSubmit} disabled={!manualInput.trim()} style={{
              flex:1,padding:"12px 16px",borderRadius:14,border:"none",fontSize:17,fontWeight:700,cursor:"pointer",
              background:manualInput.trim()?"#f97316":"#e2e8f0",color:manualInput.trim()?"white":"#94a3b8",
            }}>识别并记录</button>
          </div>
        </div>
        {isListening&&(<div style={{marginTop:12,background:"linear-gradient(135deg,#dc2626,#ef4444)",borderRadius:14,padding:"14px 16px",textAlign:"center",color:"white",fontSize:15,fontWeight:500,animation:"pulse 1.5s ease-in-out infinite"}}>
          🎙️ 正在听您说话...{voiceText&&<div style={{marginTop:8,background:"rgba(255,255,255,0.15)",borderRadius:8,padding:"8px 12px",fontSize:15,textAlign:"left",lineHeight:1.5}}>{voiceText}</div>}
        </div>)}
      </div>)}

      {/* Confirm modal */}
      {showConfirm&&parseResult&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900,padding:16}} onClick={()=>setShowConfirm(false)}>
        <div style={{background:"white",borderRadius:24,padding:24,width:"100%",maxWidth:420,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 24px 48px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:20,fontWeight:800,marginBottom:6}}>🤖 识别结果确认</div>
          <div style={{fontSize:14,color:"#94a3b8",marginBottom:16}}>请检查是否正确，可修改后保存</div>
          <div style={{background:"#f8fafc",borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:14,color:"#64748b",lineHeight:1.5}}><span style={{fontWeight:600}}>原文：</span>{voiceText}</div>
          {parseResult.mealGroups?.map((g,gi)=>g.foods.length>0&&(<div key={gi} style={{marginBottom:16}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:"#f97316"}}>{MEAL_TYPES.find(m=>m.key===g.meal)?.icon} {MEAL_TYPES.find(m=>m.key===g.meal)?.label}的食物</div>
            {g.foods.map((f,fi)=>(<div key={fi} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div><span style={{fontSize:16,fontWeight:600}}>{f.name}</span>{f.isCustom&&<span style={{fontSize:11,color:"#f59e0b",marginLeft:4,background:"#fffbeb",padding:"1px 6px",borderRadius:4}}>未收录·默认100卡</span>}<span style={{fontSize:13,color:"#94a3b8",marginLeft:6}}>{Math.round(f.cal*f.amount)}卡</span></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>updateParsedFoodAmount(gi,fi,-0.5)} style={{width:30,height:30,borderRadius:8,border:"none",background:"#f1f5f9",fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <span style={{fontSize:16,fontWeight:700,minWidth:28,textAlign:"center"}}>{f.amount}</span>
                <button onClick={()=>updateParsedFoodAmount(gi,fi,0.5)} style={{width:30,height:30,borderRadius:8,border:"none",background:"#f1f5f9",fontSize:16,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                <span style={{fontSize:12,color:"#94a3b8"}}>{f.unit}</span>
                <button onClick={()=>removeParsedFood(gi,fi)} style={{marginLeft:4,background:"#fef2f2",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,color:"#ef4444",cursor:"pointer",fontWeight:600}}>✕</button>
              </div>
            </div>))}
          </div>))}
          {parseResult.bloodSugar.length>0&&(<div style={{marginBottom:16}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8,color:"#6366f1"}}>🩸 血糖</div>
            {parseResult.bloodSugar.map((s,idx)=>(<div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}><span style={{fontSize:15,color:"#64748b"}}>{s.timing}</span><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,fontWeight:700,color:s.value>11.1||s.value<4?"#ef4444":"#6366f1"}}>{s.value} mmol/L</span><button onClick={()=>removeParsedSugar(idx)} style={{background:"#fef2f2",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,color:"#ef4444",cursor:"pointer"}}>✕</button></div></div>))}
          </div>)}
          {parseResult.weight&&(<div style={{marginBottom:16}}><div style={{fontSize:16,fontWeight:700,marginBottom:8,color:"#10b981"}}>⚖️ 体重</div><div style={{fontSize:22,fontWeight:800,color:"#10b981"}}>{parseResult.weight} kg</div></div>)}
          {!hasAnyParsed&&(<div style={{padding:20,textAlign:"center",color:"#94a3b8",fontSize:16}}>没有识别到有效内容，请重新录入</div>)}
          <div style={{display:"flex",gap:12,marginTop:8}}>
            <button onClick={()=>{setShowConfirm(false);setVoiceText("");setParseResult(null);}} style={{flex:1,padding:14,borderRadius:14,border:"2px solid #e2e8f0",background:"white",fontSize:17,fontWeight:600,cursor:"pointer",color:"#64748b"}}>取消</button>
            <button onClick={confirmSave} disabled={!hasAnyParsed} style={{flex:1,padding:14,borderRadius:14,border:"none",background:hasAnyParsed?"#f97316":"#e2e8f0",color:hasAnyParsed?"white":"#94a3b8",fontSize:17,fontWeight:700,cursor:"pointer"}}>✓ 确认保存</button>
          </div>
        </div>
      </div>)}

      {/* Summary cards with anomaly colors */}
      {activeTab==="record"&&(<div style={{padding:"16px 16px 0"}}>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div style={{flex:1,background:"white",borderRadius:16,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",textAlign:"center",border:`2px solid ${statusColor(dayStatus.calStatus)}`}}><div style={{fontSize:13,color:"#94a3b8"}}>今日热量</div><div style={{fontSize:26,fontWeight:800,color:statusColor(dayStatus.calStatus)}}>{todayCal||"—"}</div><div style={{fontSize:12,color:"#cbd5e1"}}>{todayCal?"大卡":"未记录"}</div></div>
          <div style={{flex:1,background:"white",borderRadius:16,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",textAlign:"center",border:`2px solid ${statusColor(dayStatus.weightStatus)}`}}><div style={{fontSize:13,color:"#94a3b8"}}>体重</div><div style={{fontSize:26,fontWeight:800,color:statusColor(dayStatus.weightStatus)}}>{dayData.weight||"—"}</div><div style={{fontSize:12,color:"#cbd5e1"}}>{dayData.weight?"kg":"未记录"}</div></div>
          <div style={{flex:1,background:"white",borderRadius:16,padding:14,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",textAlign:"center",border:`2px solid ${statusColor(dayStatus.sugarStatus)}`}}><div style={{fontSize:13,color:"#94a3b8"}}>血糖</div><div style={{fontSize:26,fontWeight:800,color:statusColor(dayStatus.sugarStatus)}}>{dayData.bloodSugar?.length?dayData.bloodSugar[dayData.bloodSugar.length-1].value:"—"}</div><div style={{fontSize:12,color:"#cbd5e1"}}>{dayData.bloodSugar?.length?`最新 ${dayData.bloodSugar[dayData.bloodSugar.length-1].timing}`:"未记录"}</div></div>
        </div>

        {/* Meal records */}
        {MEAL_TYPES.map(meal=>{const items=dayData.meals?.[meal.key];if(!items||!items.length)return null;const mc=items.reduce((a,b)=>a+(b.cal||0)*(b.amount||1),0);return(<div key={meal.key} style={{background:"white",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:16,fontWeight:700,color:"#475569"}}>{meal.icon} {meal.label}</span><span style={{fontSize:14,color:"#f97316",fontWeight:600}}>{mc}大卡</span></div>
          {items.map((item,idx)=>(<div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:idx<items.length-1?"1px solid #f1f5f9":"none"}}><div><span style={{fontSize:16,fontWeight:600,color:"#334155"}}>{item.name}</span><span style={{fontSize:14,color:"#94a3b8",marginLeft:8}}>{item.amount}{item.unit}</span></div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,color:"#f97316"}}>{item.cal*item.amount}卡</span><button className="edit-btn" onClick={()=>editFood(meal.key,idx)}>改</button><button className="del-btn" onClick={()=>removeFood(meal.key,idx)}>删</button></div></div>))}
        </div>);})}

        {/* Weight record */}
        {dayData.weight&&(<div style={{background:"white",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:10,color:"#475569"}}>⚖️ 今日体重</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:22,fontWeight:800,color:statusColor(dayStatus.weightStatus)}}>{dayData.weight}</span><span style={{fontSize:15,color:"#94a3b8",marginLeft:4}}>kg</span></div><div style={{display:"flex",gap:6}}><button className="edit-btn" onClick={editWeight}>改</button><button className="del-btn" onClick={removeWeight}>删</button></div></div>
        </div>)}

        {/* Blood sugar records */}
        {dayData.bloodSugar?.length>0&&(<div style={{background:"white",borderRadius:16,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:10,color:"#475569"}}>🩸 今日血糖</div>
          {dayData.bloodSugar.map((bs,idx)=>(<div key={idx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:idx<dayData.bloodSugar.length-1?"1px solid #f1f5f9":"none"}}><span style={{fontSize:15,color:"#64748b"}}>{bs.timing} {bs.time}</span><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:18,fontWeight:700,color:bs.value>11.1||bs.value<4?"#ef4444":"#6366f1"}}>{bs.value}</span><button className="edit-btn" onClick={()=>editSugar(idx)}>改</button><button className="del-btn" onClick={()=>removeSugar(idx)}>删</button></div></div>))}
        </div>)}

        {todayCal===0&&!dayData.weight&&!dayData.bloodSugar?.length&&(<div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8"}}><div style={{fontSize:48,marginBottom:12}}>📋</div><div style={{fontSize:17,fontWeight:600,marginBottom:6}}>今天还没有记录</div><div style={{fontSize:14}}>点击上方麦克风，说出今天的饮食吧</div></div>)}
      </div>)}

      {/* Trends tab */}
      {activeTab==="trends"&&(<div style={{padding:16}}>
        <div style={{display:"flex",gap:8,marginBottom:16}}>{[7,30].map(n=>(<button key={n} onClick={()=>setTrendRange(n)} style={{flex:1,padding:10,borderRadius:12,fontSize:15,fontWeight:700,border:"none",cursor:"pointer",background:trendRange===n?"#f97316":"white",color:trendRange===n?"white":"#64748b",boxShadow:trendRange===n?"0 2px 12px rgba(249,115,22,0.3)":"0 1px 4px rgba(0,0,0,0.06)"}}>{n}天</button>))}</div>

        <div style={{background:"white",borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}><div style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:4}}>⚖️ 体重趋势</div><div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>化疗期间目标：维持体重稳定</div><SimpleChart dataPoints={trendAnalysis.weights} label="体重" color="#10b981"/></div>

        {/* Blood sugar - single card with type switcher */}
        {(()=>{
          const types=[{key:"空腹",label:"空腹",dh:7},{key:"餐后1h",label:"餐后1h",dh:11.1},{key:"餐后2h",label:"餐后2h",dh:10}];
          const allEmpty=types.every(tp=>!(trendAnalysis.sugarsByType[tp.key]||[]).length);
          return(<div style={{background:"white",borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:4}}>🩸 血糖趋势</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>点击下方标签切换查看不同时段的血糖趋势</div>
            {allEmpty?(<div style={{padding:"28px 16px",textAlign:"center",color:"#94a3b8",fontSize:16,background:"#f8fafc",borderRadius:12}}>暂无血糖数据</div>):(
              <SugarTabs types={types} sugarsByType={trendAnalysis.sugarsByType}/>
            )}
          </div>);
        })()}

        <div style={{background:"white",borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}><div style={{fontSize:18,fontWeight:800,color:"#1e293b",marginBottom:4}}>🍽️ 每日热量</div><div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>建议每日1500-1800大卡</div><SimpleChart dataPoints={trendAnalysis.dailyCals} label="热量" color="#f97316" dangerLow={1200}/></div>
      </div>)}

      {/* Analysis tab */}
      {activeTab==="analysis"&&(<div style={{padding:16}}>
        <div style={{display:"flex",gap:8,marginBottom:16}}>{["today","7","30"].map(n=>(<button key={n} onClick={()=>setAnalysisRange(n)} style={{flex:1,padding:10,borderRadius:12,fontSize:15,fontWeight:700,border:"none",cursor:"pointer",background:analysisRange===n?"#f97316":"white",color:analysisRange===n?"white":"#64748b",boxShadow:analysisRange===n?"0 2px 12px rgba(249,115,22,0.3)":"0 1px 4px rgba(0,0,0,0.06)"}}>{n==="today"?"今天":n+"天"}</button>))}</div>
        {analysis.alerts.map((a,i)=>(<div key={i} style={{background:a.type==="danger"?"#fef2f2":"#fffbeb",border:`2px solid ${a.type==="danger"?"#fecaca":"#fde68a"}`,borderRadius:16,padding:18,marginBottom:12}}><div style={{fontSize:18,fontWeight:800,marginBottom:8,color:a.type==="danger"?"#dc2626":"#d97706"}}>{a.icon} {a.title}</div><div style={{fontSize:15,lineHeight:1.8,color:a.type==="danger"?"#991b1b":"#92400e",whiteSpace:"pre-line"}}>{a.text}</div></div>))}
        {analysis.suggestions.map((s,i)=>(<div key={i} style={{background:"white",borderRadius:16,padding:18,marginBottom:10,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><div style={{fontSize:15,lineHeight:1.8,color:"#475569",whiteSpace:"pre-line"}}>{s.icon} {s.text}</div></div>))}
        <div style={{background:"linear-gradient(135deg,#fef3c7,#fde68a)",borderRadius:16,padding:18,marginTop:8}}><div style={{fontSize:14,color:"#92400e",lineHeight:1.6}}>⚕️ <strong>重要提醒：</strong>本工具的分析基于66岁糖尿病化疗患者的特殊背景，仅供参考，不构成医疗建议。具体请遵医嘱。</div></div>
      </div>)}

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #f1f5f9",display:"flex",justifyContent:"center",padding:"8px 0 env(safe-area-inset-bottom, 20px)",boxShadow:"0 -2px 16px rgba(0,0,0,0.06)",zIndex:700}}>
        <div style={{display:"flex",gap:4,maxWidth:480,width:"100%"}}>
          {[{key:"record",icon:"📝",label:"记录"},{key:"trends",icon:"📊",label:"趋势"},{key:"analysis",icon:"🤖",label:"AI分析"}].map(tab=>(<button key={tab.key} onClick={()=>setActiveTab(tab.key)} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:6,opacity:activeTab===tab.key?1:0.5}}><span style={{fontSize:24}}>{tab.icon}</span><span style={{fontSize:12,fontWeight:700,color:activeTab===tab.key?"#f97316":"#94a3b8"}}>{tab.label}</span></button>))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
